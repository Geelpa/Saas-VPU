<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-orange-500 min-h-screen text-gray-800">

    <header class="bg-orange-500 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-0">
            <img src="logo_f_e.png" class="h-20 mt-[-16px]object-contain" alt="">
        </div>
    </header>

    <main class="max-w-7xl m-auto p-2 grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- UTILIZAÇÃO -->
        <div class="bg-white rounded-2xl shadow-sm p-4 ">

            <h2 class="text-2xl font-bold mb-6 text-center">
                Dias de utilização
            </h2>

            <div class="flex justify-between items-center gap-1">
                <div class="w-full ">
                    <label for="startDate" class="block font-bold">
                        Data Inicial
                    </label>
                    <input type="date" id="startDate" class="w-full rounded-xl px-4 py-2 bg-slate-200 ">
                </div>

                <div class="w-full">
                    <label for="endDate" class="block font-bold  mb-1 mx-2">
                        Data Final
                    </label>

                    <input type="date" id="endDate" class="w-full rounded-xl px-4 py-2 bg-slate-200 ">
                </div>

            </div>

            <!-- PLANOS -->
            <div class="mt-6">
                <h3 class="font-semibold mb-3 text-lg">
                    Plano
                </h3>

                <div class="grid grid-cols-3 md:grid-cols-5 gap-3">

                    <label
                        class="flex items-center justify-center justify-center gap-2 bg-slate-200 rounded-xl p-2 cursor-pointer transition font-semibold">
                        <input type="radio" name="plan" value="3.70">
                        300mb
                    </label>

                    <label
                        class="flex items-center justify-between gap-2 bg-slate-200 rounded-xl p-2 cursor-pointer transition font-semibold text-center">
                        <input type="radio" name="plan" value="4.07">
                        500mb
                    </label>

                    <label
                        class="flex items-center justify-center gap-2 bg-slate-200 rounded-xl p-2 cursor-pointer transition font-semibold text-center">
                        <input type="radio" name="plan" value="4.81">
                        600mb
                    </label>

                    <label
                        class="flex items-center justify-center gap-2 bg-slate-200 rounded-xl p-2 cursor-pointer transition font-semibold text-center">
                        <input type="radio" name="plan" value="5.55">
                        800mb
                    </label>

                    <label
                        class="flex items-center justify-center gap-2 bg-slate-200 rounded-xl p-2 cursor-pointer transition font-semibold text-center">
                        <input type="radio" name="plan" value="7.40">
                        1Gb
                    </label>

                </div>
            </div>

            <!-- CHECKBOX -->
            <div class="mt-6">
                <label class="flex items-center gap-2 ">
                    <input type="checkbox" id="incluirInicio">
                    Incluir data de início (+1 dia)
                </label>
            </div>

            <!-- BOTÃO -->
            <button id="calcularBtn"
                class="mt-6 bg-orange-500 hover:bg-orange-600 text-white font-semibold px-6 py-3 rounded-xl transition w-full">
                Calcular
            </button>

            <!-- RESULTADO -->
            <div id="output" class="bg-orange-50 border-orange-200 rounded-xl p-4  leading-relaxed">
            </div>

        </div>
        <!-- TABELA VENCIMENTO-->
        <div class="bg-white rounded-2xl shadow-sm border p-4 h-fit">

            <h2 class="text-2xl font-bold mb-6 text-center">
                Vencimento e Bloqueio de Sinal
            </h2>

            <table
                class="w-full text-sm border-separate border-spacing-0 overflow-hidden rounded-xl font-semibold text-center">
                <thead>
                    <tr class="bg-slate-200">

                        <th class="border p-2">
                            Vencimento
                        </th>

                        <th class="border p-2">
                            Bloqueio
                        </th>

                        <th class="border p-2">
                            Liberação
                        </th>

                        <th class="border p-2">
                            Avisos
                        </th>

                    </tr>
                </thead>

                <tbody id="tabelaVencimentos"></tbody>

            </table>

        </div>

    </main>

    <script src="handleCountDate.js"></script>
    <script src="handleDueDate.js"></script>

</body>


</html>
